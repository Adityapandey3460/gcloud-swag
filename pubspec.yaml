name: swag_admin_app
description: Google Cloud Swag Distribution - Admin Scanner App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # QR Scanner
  mobile_scanner: ^3.5.6

  # QR Code Generator (for viewing student QR)
  qr_flutter: ^4.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  iconsax: ^0.0.8

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
